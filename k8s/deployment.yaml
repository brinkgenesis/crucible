apiVersion: apps/v1
kind: Deployment
metadata:
  name: infra-orchestrator
  labels:
    app: infra-orchestrator
spec:
  replicas: 2
  selector:
    matchLabels:
      app: infra-orchestrator
  template:
    metadata:
      labels:
        app: infra-orchestrator
    spec:
      terminationGracePeriodSeconds: 60
      containers:
      - name: infra-orchestrator
        image: infra-orchestrator:latest
        ports:
        - containerPort: 4000
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: infra-orchestrator-secrets
              key: database-url
        - name: SECRET_KEY_BASE
          valueFrom:
            secretKeyRef:
              name: infra-orchestrator-secrets
              key: secret-key-base
        - name: API_KEY
          valueFrom:
            secretKeyRef:
              name: infra-orchestrator-secrets
              key: api-key
        - name: PHX_HOST
          valueFrom:
            configMapKeyRef:
              name: infra-orchestrator-config
              key: phx-host
        - name: PORT
          value: "4000"
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /health/live
            port: 4000
          initialDelaySeconds: 15
          periodSeconds: 20
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 4000
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /health/startup
            port: 4000
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 12
